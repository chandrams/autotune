name: Sanity tests 

on:
  schedule:
  - cron: "0 0 * * *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sanity_tests:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
         with:
          repository: kruize/benchmarks
      - name: Setup Minikube
        uses: manusa/actions-setup-minikube@v2.3.0
        with:
          minikube version: 'v1.16.0'
          kubernetes version: 'v1.19.2'
      - name: Start minikube
        run: |
          kubectl cluster-info
          kubectl get pods -n kube-system      
      - name: Install Prometheus on minikube
        run: |
          echo Install Prometheus on minikube  
          cd scripts
          ./prometheus_on_minikube.sh -as    
      - name: Run Sanity tests
        run: |
          echo Running Sanity tests
          cd tests
          ./test_autotune.sh -c minikube -i kruize/autotune:test --tctype=functional --testsuite=app_autotune_yaml_tests --testcase=sla_class -r $GIHUB_WORKSPACE/benchmarks --resultsdir=$GITHUB_WORKSPACE/autotune-results

